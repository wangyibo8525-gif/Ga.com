<h1>Type this!</h1>
<input type="text" id="typeInput">
<p>Score: <span id="score">0</span></p>
<p>Created by: กาฟิว & เจมินาย</p>

<script>
  const audio = new Audio('https://www.soundjay.com/mechanical/sounds/keyboard-key-press-01.mp3');
  const input = document.getElementById('typeInput');
  input.oninput = () => {
    audio.play();
    document.getElementById('score').innerText++;
  };
</script>
