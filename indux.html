[ ] <script>
  const audio = new Audio('typing.mp3'); // ชื่อไฟล์เสียงของคุณ
  const inputField = document.querySelector('input'); // ช่องสำหรับพิมพ์

  inputField.addEventListener('input', () => {
    audio.currentTime = 0; // รีเซ็ตเสียงให้เล่นใหม่ทุกครั้งที่พิมพ์
    audio.play();
  });
</script>
